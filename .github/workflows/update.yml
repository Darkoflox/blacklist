name: "Wi‑Fi Update (ЧС)"

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:         # ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # достаточно для проверки
    permissions:
      contents: write        # разрешаем коммиты
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser (TCP+TLS, Telegram)
        run: python parser.py --threads 20 --parse-telegram

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автообновление Wi‑Fi подписок"
          file_pattern: '*.txt'
