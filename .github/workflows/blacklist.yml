name: Update Proxy Lists

on:
  schedule:
    # Запуск в 00:00 и 12:00 по Москве (UTC+3)
    # В UTC это 21:00 предыдущего дня и 09:00 текущего дня
    - cron: '0 9,21 * * *'
  workflow_dispatch:   # ручной запуск
  push:
    branches:
      - main
    paths:
      - 'sources/sources.txt'

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🚀 Run parser
        run: python parser.py

      - name: 📊 Commit & Push changes
        run: |
          git config --global user.name "Kfg Bot"
          git config --global user.email "bot@kfg.example.com"
          git add public/sub.txt public/sub_ios.txt public/sub_singbox.json public/stats.json
          git commit -m "🔄 Update proxy lists $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
