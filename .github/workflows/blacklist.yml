name: Blacklist Parser (ЧС)

on:
  schedule:
    - cron: '0 */12 * * *'   # каждые 12 часов
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Blacklist Parser
        run: python blacklist_parser.py

      - name: Commit & Push
        run: |
          git config --global user.name "Kfg Bot"
          git config --global user.email "bot@kfg.dev"
          git add public/sub_black.txt public/sub_ios_black.txt public/sub_singbox_black.json public/stats_black.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🔄 Blacklist (ЧС) update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
