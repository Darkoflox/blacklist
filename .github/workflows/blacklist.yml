name: Update Lists

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run parser
        run: python blacklist_parser.py

      - name: Commit & Push
        run: |
          git config --global user.name "Kfg Bot"
          git config --global user.email "bot@kfg.dev"
          git add public/ stats.json README.md
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🔄 Update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
